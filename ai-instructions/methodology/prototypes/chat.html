<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Teaching Prototype - Microscopy</title>
  <link rel="stylesheet" href="styles/components.css">
  <style>
    /* Page Layout Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-family);
      background: var(--color-background);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
      color: white;
      padding: var(--spacing-lg) var(--spacing-xl);
      box-shadow: var(--shadow-lg);
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .header .subtitle {
      font-size: var(--font-size-sm);
      opacity: 0.9;
      margin-top: var(--spacing-xs);
    }

    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: var(--spacing-xl);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-lg);
    }

    .input-container {
      padding: var(--spacing-lg) var(--spacing-xl);
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: var(--spacing-md);
      max-width: 900px;
      margin: 0 auto;
    }

    #messageInput {
      flex: 1;
      padding: var(--spacing-md) var(--spacing-lg);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: var(--font-size-base);
      font-family: inherit;
      resize: none;
      min-height: 48px;
      max-height: 150px;
    }

    #messageInput:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    #sendBtn {
      padding: var(--spacing-md) var(--spacing-xl);
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--font-size-base);
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #sendBtn:hover:not(:disabled) {
      background: var(--color-primary-dark);
    }

    #sendBtn:disabled {
      background: var(--color-border);
      cursor: not-allowed;
    }

    /* Streaming message styles */
    .message.streaming .message-content {
      border-right: 2px solid var(--color-primary);
      animation: cursorBlink 1s infinite;
    }

    @keyframes cursorBlink {
      0%, 50% { border-right-color: var(--color-primary); }
      51%, 100% { border-right-color: transparent; }
    }

    .component-loading {
      padding: var(--spacing-md);
      color: var(--color-text-muted);
      font-style: italic;
    }

    .loading-dots {
      animation: loadingDots 1.5s infinite;
    }

    @keyframes loadingDots {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔬 Microscopy Teaching Session</h1>
    <div class="subtitle">Conversational AI Tutor • TEACH → VERIFY Methodology</div>
  </div>

  <div class="chat-container">
    <div class="messages" id="messages">
      <div class="status">
        Session started. The AI tutor will guide you through the lesson using the TEACH → VERIFY methodology.
      </div>
    </div>

    <div class="input-container">
      <div class="input-wrapper">
        <textarea
          id="messageInput"
          placeholder="Type your response here..."
          rows="1"
        ></textarea>
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <script type="module">
    // Import components
    import { MessageBubble } from './components/MessageBubble.js';
    import { Comparison } from './components/Comparison.js';
    import { Callout } from './components/Callout.js';
    import { Hook } from './components/Hook.js';
    import { Table } from './components/Table.js';
    import { Image } from './components/Image.js';
    import { ComponentParser } from './components/index.js';

    // Session state
    const sessionId = 'session_' + Date.now();
    let isWaitingForResponse = false;

    // DOM elements
    const messagesContainer = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    /**
     * Create a component instance from parsed data
     * @param {string} type - Component type
     * @param {object} data - Component data
     * @returns {Component|null}
     */
    function createComponent(type, data) {
      switch (type) {
        case 'comparison':
          return new Comparison(data);
        case 'callout':
          return new Callout(data);
        case 'hook':
          return new Hook(data);
        case 'table':
          return new Table(data);
        case 'image':
          return new Image(data);
        default:
          console.warn(`Unknown component type: ${type}`);
          return null;
      }
    }

    /**
     * Add a message to the chat using components
     * @param {string} role - 'user' or 'assistant'
     * @param {string} content - Message content (may contain component markers)
     */
    function addMessage(role, content) {
      // Remove typing indicator if exists
      const typingIndicator = document.querySelector('.message.typing');
      if (typingIndicator) {
        typingIndicator.remove();
      }

      // Parse content for embedded components
      const parsed = ComponentParser.parse(content);

      // Create component instances
      const componentInstances = parsed.components.map(({ type, data }) => {
        return createComponent(type, data);
      }).filter(c => c !== null);

      // Create message bubble with nested components
      const message = new MessageBubble({
        role,
        content: parsed.text,
        components: componentInstances
      });

      // Render to container
      message.mount(messagesContainer);

      // Scroll to bottom
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    /**
     * Show typing indicator
     */
    function showTypingIndicator() {
      const indicator = document.createElement('div');
      indicator.className = 'message assistant typing';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = '🔬';

      const content = document.createElement('div');
      content.className = 'typing-indicator active';
      content.innerHTML = `
        <div class="typing-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      `;

      indicator.appendChild(avatar);
      indicator.appendChild(content);
      messagesContainer.appendChild(indicator);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    /**
     * Create a streaming message element that we can update progressively
     */
    function createStreamingMessage() {
      const message = document.createElement('div');
      message.className = 'message assistant streaming';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = '🔬';

      const body = document.createElement('div');
      body.className = 'message-body';

      const content = document.createElement('div');
      content.className = 'message-content';
      content.innerHTML = '';

      body.appendChild(content);
      message.appendChild(avatar);
      message.appendChild(body);

      return { message, body, content };
    }

    /**
     * Render streamed content progressively
     * Text streams in real-time, components render when complete
     */
    function renderStreamedContent(body, fullText) {
      // Clear body
      body.innerHTML = '';

      // Parse for complete components
      const parsed = ComponentParser.parse(fullText);

      // Create component instances for complete components
      const componentInstances = parsed.components.map(({ type, data }) => {
        return createComponent(type, data);
      }).filter(c => c !== null);

      // Check if we're in the middle of a component tag
      const hasIncompleteComponent = /\[(?:IMAGE|HOOK|CALLOUT|COMPARISON|TABLE)\](?:(?!\[\/(?:IMAGE|HOOK|CALLOUT|COMPARISON|TABLE)\]).)*$/s.test(fullText);

      if (componentInstances.length === 0 && !hasIncompleteComponent) {
        // No components - just show text with formatting
        const textContent = document.createElement('div');
        textContent.className = 'message-content';
        textContent.innerHTML = parsed.text
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\n/g, '<br>');
        body.appendChild(textContent);
      } else {
        // Has components - render text and components
        const parts = parsed.text.split(/(\{\{COMPONENT_\d+\}\})/g);

        parts.forEach(part => {
          const match = part.match(/\{\{COMPONENT_(\d+)\}\}/);
          if (match) {
            const index = parseInt(match[1], 10);
            const component = componentInstances[index];
            if (component) {
              body.appendChild(component.render());
            }
          } else if (part.trim()) {
            const textBubble = document.createElement('div');
            textBubble.className = 'message-content';
            textBubble.innerHTML = part
              .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
              .replace(/\n/g, '<br>');
            body.appendChild(textBubble);
          }
        });

        // If there's an incomplete component, show a loading indicator
        if (hasIncompleteComponent) {
          const loadingEl = document.createElement('div');
          loadingEl.className = 'component-loading';
          loadingEl.innerHTML = '<span class="loading-dots">...</span>';
          body.appendChild(loadingEl);
        }
      }
    }

    /**
     * Send message to server with streaming
     */
    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message || isWaitingForResponse) return;

      // Add user message to chat
      addMessage('user', message);
      messageInput.value = '';
      messageInput.style.height = 'auto';

      // Disable input
      isWaitingForResponse = true;
      messageInput.disabled = true;
      sendBtn.disabled = true;

      // Remove any existing typing indicator
      const existingTyping = document.querySelector('.message.typing');
      if (existingTyping) existingTyping.remove();

      // Create streaming message element
      const { message: messageEl, body } = createStreamingMessage();
      messagesContainer.appendChild(messageEl);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      let fullText = '';

      try {
        const response = await fetch('http://localhost:3000/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: message,
            sessionId: sessionId
          })
        });

        if (!response.ok) {
          throw new Error('Failed to get response');
        }

        // Read the SSE stream
        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const text = decoder.decode(value);
          const lines = text.split('\n');

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));

                if (data.chunk) {
                  fullText += data.chunk;
                  renderStreamedContent(body, fullText);
                  messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }

                if (data.error) {
                  throw new Error(data.error);
                }
              } catch (e) {
                if (e.message !== 'Unexpected end of JSON input') {
                  console.error('Parse error:', e);
                }
              }
            }
          }
        }

        // Final render with complete message
        messageEl.classList.remove('streaming');
        renderStreamedContent(body, fullText);

      } catch (error) {
        console.error('Error:', error);
        messageEl.remove();

        // Show error
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message';
        errorDiv.textContent = 'Sorry, there was an error connecting to the AI tutor. Please check that the server is running.';
        messagesContainer.appendChild(errorDiv);
      }

      // Re-enable input
      isWaitingForResponse = false;
      messageInput.disabled = false;
      sendBtn.disabled = false;
      messageInput.focus();
    }

    // Event listeners
    sendBtn.addEventListener('click', sendMessage);

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = messageInput.scrollHeight + 'px';
    });

    // Send initial message to start lesson (with streaming)
    window.addEventListener('load', async () => {
      setTimeout(async () => {
        // Create streaming message element
        const { message: messageEl, body } = createStreamingMessage();
        messagesContainer.appendChild(messageEl);

        let fullText = '';

        try {
          const response = await fetch('http://localhost:3000/api/chat', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              message: 'Hello! I\'m ready to start the lesson.',
              sessionId: sessionId
            })
          });

          const reader = response.body.getReader();
          const decoder = new TextDecoder();

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const text = decoder.decode(value);
            const lines = text.split('\n');

            for (const line of lines) {
              if (line.startsWith('data: ')) {
                try {
                  const data = JSON.parse(line.slice(6));
                  if (data.chunk) {
                    fullText += data.chunk;
                    renderStreamedContent(body, fullText);
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                  }
                } catch (e) {}
              }
            }
          }

          messageEl.classList.remove('streaming');
          renderStreamedContent(body, fullText);

        } catch (error) {
          console.error('Error starting lesson:', error);
          messageEl.remove();

          const errorDiv = document.createElement('div');
          errorDiv.className = 'error-message';
          errorDiv.textContent = 'Could not connect to the server. Please run "npm start" in the prototypes folder.';
          messagesContainer.appendChild(errorDiv);
        }
      }, 500);
    });
  </script>
</body>
</html>
